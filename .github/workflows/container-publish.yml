name: Build and Publish Container

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing upstream git tag to build and publish, for example v13.2"
        required: false
        type: string

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  UPSTREAM_REPO: dorkcoinorg/dorkcoin

concurrency:
  group: container-publish
  cancel-in-progress: false

jobs:
  prepare:
    name: Resolve target version
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.resolve.outputs.should_build }}
      target_tag: ${{ steps.resolve.outputs.target_tag }}
      upstream_commit: ${{ steps.resolve.outputs.upstream_commit }}
      checkout_ref: ${{ steps.resolve.outputs.checkout_ref }}
      is_release: ${{ steps.resolve.outputs.is_release }}
    steps:
      - name: Resolve tag and upstream commit
        id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
          REF: ${{ github.ref }}
          SHA: ${{ github.sha }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          UPSTREAM_REPO: ${{ env.UPSTREAM_REPO }}
        shell: bash
        run: |
          set -euo pipefail

          should_build=false
          target_tag=""
          upstream_commit=""
          checkout_ref=""
          is_release=false

          resolve_upstream_commit() {
            local tag="$1"
            gh api "repos/$UPSTREAM_REPO/git/ref/tags/$tag" -q '.object.sha'
          }

          if [ "$EVENT_NAME" = "pull_request" ]; then
            should_build=true
            checkout_ref="$SHA"
            echo "PR build only"
          elif [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            should_build=true
            checkout_ref="refs/heads/$DEFAULT_BRANCH"

            if [ -n "${INPUT_TAG:-}" ]; then
              target_tag="$INPUT_TAG"
              upstream_commit="$(resolve_upstream_commit "$target_tag")"
              is_release=true
              echo "Manual release build for upstream tag $target_tag @ $upstream_commit"
            else
              echo "Manual branch build only"
            fi
          elif [[ "$REF" == refs/tags/v* ]]; then
            should_build=true
            target_tag="$REF_NAME"
            upstream_commit="$(resolve_upstream_commit "$target_tag")"
            checkout_ref="$REF"
            is_release=true
            echo "Repo tag push release build for upstream tag $target_tag @ $upstream_commit"
          else
            should_build=true
            checkout_ref="$REF"
            echo "Branch build only"
          fi

          {
            echo "should_build=$should_build"
            echo "target_tag=$target_tag"
            echo "upstream_commit=$upstream_commit"
            echo "checkout_ref=$checkout_ref"
            echo "is_release=$is_release"
          } >> "$GITHUB_OUTPUT"

  build:
    name: Build image
    runs-on: ubuntu-latest
    needs: prepare
    if: needs.prepare.outputs.should_build == 'true'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: needs.prepare.outputs.is_release == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ needs.prepare.outputs.target_tag }},enable=${{ needs.prepare.outputs.is_release == 'true' && needs.prepare.outputs.target_tag != '' }}
            type=raw,value=latest,enable=${{ needs.prepare.outputs.is_release == 'true' }}
            type=ref,event=branch,enable=${{ needs.prepare.outputs.is_release != 'true' }}
            type=ref,event=pr,enable=${{ needs.prepare.outputs.is_release != 'true' }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          build-args: |
            DORKCOIN_REPO_URL=https://github.com/${{ env.UPSTREAM_REPO }}.git
            DORKCOIN_REF=${{ needs.prepare.outputs.target_tag != '' && needs.prepare.outputs.target_tag || github.ref_name }}
            DORKCOIN_COMMIT=${{ needs.prepare.outputs.upstream_commit }}
          platforms: linux/amd64,linux/arm64
          push: ${{ needs.prepare.outputs.is_release == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create GitHub Release
        if: needs.prepare.outputs.is_release == 'true' && needs.prepare.outputs.target_tag != ''
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          tag="${{ needs.prepare.outputs.target_tag }}"
          commit="${{ needs.prepare.outputs.upstream_commit }}"
          image="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${tag}"
          latest_image="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"

          if gh release view "$tag" >/dev/null 2>&1; then
            echo "Release $tag already exists"
            exit 0
          fi

          gh release create "$tag" \
            --title "$tag" \
            --notes "Automated container release for upstream tag $tag

          Upstream:
          - Repository: \`${{ env.UPSTREAM_REPO }}\`
          - Tag: \`${tag}\`
          - Commit: \`${commit}\`

          Published images:
          - \`${image}\`
          - \`${latest_image}\`"